<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Playlist Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a26;
            --border: #2a2a3a;
            --text: #e8e8f0;
            --text-dim: #8888a0;
            --accent: #1db954;
            --accent-hover: #1ed760;
            --red: #e54040;
            --red-hover: #f05050;
            --yellow: #f0b030;
            --blue: #3090f0;
            --purple: #1db954;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }

        /* ─── Header ─── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 32px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header h1 span { color: var(--accent); }

        .header-actions { display: flex; gap: 10px; }

        /* ─── Buttons ─── */
        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
        }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }

        .btn-danger {
            background: var(--red);
            color: #fff;
        }
        .btn-danger:hover { background: var(--red-hover); }

        .btn-outline {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

        .btn-small {
            padding: 5px 12px;
            font-size: 12px;
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-icon:hover { color: var(--red); border-color: var(--red); }

        /* ─── Main Content ─── */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 28px 24px;
        }

        /* ─── Add Account Form ─── */
        .add-account-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 28px;
        }

        .add-account-section h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1.5fr auto;
            gap: 10px;
            align-items: end;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            transition: border-color 0.2s;
        }
        .form-group input:focus { outline: none; border-color: var(--accent); }
        .form-group input::placeholder { color: var(--text-dim); opacity: 0.5; }

        /* ─── Account Cards ─── */
        .accounts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .account-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            transition: border-color 0.3s;
        }
        .account-card:hover { border-color: #3a3a50; }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 22px;
            border-bottom: 1px solid var(--border);
        }

        .card-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .account-name {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        /* ─── Status Badges ─── */
        .badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-idle { background: #2a2a3a; color: #8888a0; }
        .badge-starting { background: #3d3520; color: var(--yellow); }
        .badge-playing { background: #1a3a20; color: var(--accent); }
        .badge-done { background: #1a2a40; color: var(--blue); }
        .badge-error { background: #3a1a1a; color: var(--red); }

        .card-header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-body { padding: 18px 22px; }

        /* ─── Progress Bar ─── */
        .progress-section {
            margin-bottom: 18px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .progress-bar-bg {
            height: 6px;
            background: var(--bg);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #1ed760);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        /* ─── Playlist List ─── */
        .playlist-section h3 {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .playlist-list {
            list-style: none;
            margin-bottom: 12px;
        }

        .playlist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: var(--bg);
            border-radius: 8px;
            margin-bottom: 4px;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            color: var(--text-dim);
        }

        .playlist-item.active {
            border-left: 3px solid var(--accent);
            color: var(--text);
            background: var(--surface2);
        }

        .playlist-index {
            color: var(--text-dim);
            font-size: 11px;
            margin-right: 8px;
            min-width: 20px;
        }

        .playlist-uri {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .add-playlist-row {
            display: flex;
            gap: 8px;
        }

        .add-playlist-row input {
            flex: 1;
            padding: 8px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
        }
        .add-playlist-row input:focus { outline: none; border-color: var(--accent); }

        /* ─── Activity Log ─── */
        .log-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .log-section h3 {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .log-list {
            background: var(--bg);
            border-radius: 8px;
            padding: 10px 14px;
            max-height: 130px;
            overflow-y: auto;
        }

        .log-entry {
            font-size: 12px;
            color: var(--text-dim);
            padding: 3px 0;
            font-family: 'Courier New', monospace;
        }

        .log-entry .log-time {
            color: var(--accent);
            margin-right: 8px;
        }

        .log-empty {
            font-size: 12px;
            color: var(--text-dim);
            opacity: 0.5;
            font-style: italic;
        }

        /* ─── Empty State ─── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .empty-state .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state p {
            font-size: 15px;
        }

        /* ─── Auth Badge ─── */
        .auth-status {
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .auth-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .auth-dot.ok { background: var(--accent); }
        .auth-dot.no { background: var(--red); }

        /* ─── Toast ─── */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 12px 20px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 13px;
            animation: toastIn 0.3s ease;
            max-width: 320px;
        }

        .toast.error { border-color: var(--red); color: var(--red); }
        .toast.success { border-color: var(--accent); color: var(--accent); }

        @keyframes toastIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* ─── Responsive ─── */
        @media (max-width: 700px) {
            .form-row { grid-template-columns: 1fr; }
            .header { padding: 16px; flex-wrap: wrap; gap: 10px; }
            .container { padding: 16px; }
        }

        /* ─── Scrollbar ─── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>

<!-- Header -->
<header class="header">
    <div class="header-left">
        <div class="logo">🎵</div>
        <h1>Spotify Playlist <span>Bot</span></h1>
    </div>
    <div class="header-actions">
        <button class="btn btn-primary" onclick="startAll()">▶ Start All</button>
        <button class="btn btn-danger" onclick="stopAll()">■ Stop All</button>
    </div>
</header>

<div class="container">

    <!-- Add Account Form -->
    <div class="add-account-section">
        <h2>➕ Add Account</h2>
        <div class="form-row">
            <div class="form-group">
                <label>Account Name</label>
                <input type="text" id="acc-name" placeholder="My Account">
            </div>
            <div class="form-group">
                <label>Client ID</label>
                <input type="text" id="acc-client-id" placeholder="Spotify Client ID">
            </div>
            <div class="form-group">
                <label>Client Secret</label>
                <input type="text" id="acc-client-secret" placeholder="Spotify Client Secret">
            </div>
            <button class="btn btn-primary" onclick="addAccount()" style="margin-bottom: 1px;">Add</button>
        </div>
    </div>

    <!-- Account Cards Container -->
    <div id="accounts-container" class="accounts-grid">
        <div class="empty-state">
            <div class="empty-icon">🎧</div>
            <p>No accounts yet — add one above to get started</p>
        </div>
    </div>

</div>

<!-- Toast Container -->
<div class="toast-container" id="toast-container"></div>

<script>
    const API = '';
    let pollInterval = null;

    // Detect if we are in an automated test environment to bypass confirm()
    const isAutomatedTest = window.navigator.webdriver || window.isBot;

    // ─── Toast Notifications ─────────────────────────────────────
    function showToast(msg, type = 'success') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = msg;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3500);
    }

    // ─── API Helpers ─────────────────────────────────────────────
    async function apiGet(url) {
        const res = await fetch(API + url);
        return res.json();
    }

    async function apiPost(url, body = {}) {
        const res = await fetch(API + url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        return { status: res.status, data: await res.json() };
    }

    async function apiDelete(url) {
        const res = await fetch(API + url, { method: 'DELETE' });
        return res.json();
    }

    // ─── Add Account ─────────────────────────────────────────────
    async function addAccount() {
        const name = document.getElementById('acc-name').value.trim();
        const clientId = document.getElementById('acc-client-id').value.trim();
        const clientSecret = document.getElementById('acc-client-secret').value.trim();
        if (!name || !clientId || !clientSecret) {
            showToast('Fill in all fields', 'error');
            return;
        }
        const { status, data } = await apiPost('/api/accounts', {
            name, client_id: clientId, client_secret: clientSecret,
        });
        if (status >= 400) {
            showToast(data.error || 'Failed to add account', 'error');
            return;
        }
        document.getElementById('acc-name').value = '';
        document.getElementById('acc-client-id').value = '';
        document.getElementById('acc-client-secret').value = '';
        showToast(`Account "${name}" added`);
        refreshAccounts();
    }

    // ─── Delete Account ──────────────────────────────────────────
    async function deleteAccount(id, name) {
        if (!isAutomatedTest && !confirm(`Delete account "${name}"?`)) return;
        await apiDelete(`/api/accounts/${id}`);
        showToast(`Account "${name}" deleted`);
        refreshAccounts();
    }

    // ─── Playlists ───────────────────────────────────────────────
    async function addPlaylist(accountId) {
        const input = document.getElementById(`pl-input-${accountId}`);
        const uri = input.value.trim();
        if (!uri) return;
        const { status, data } = await apiPost(`/api/accounts/${accountId}/playlists`, { uri });
        if (status >= 400) {
            showToast(data.error || 'Invalid playlist', 'error');
            return;
        }
        input.value = '';
        showToast('Playlist added');
        refreshAccounts();
    }

    async function removePlaylist(accountId, index) {
        await apiDelete(`/api/accounts/${accountId}/playlists/${index}`);
        refreshAccounts();
    }

    // ─── Bot Controls ────────────────────────────────────────────
    async function startBot(id) {
        const { status, data } = await apiPost(`/api/accounts/${id}/start`);
        if (status >= 400) {
            showToast(data.error || 'Failed to start', 'error');
            return;
        }
        showToast('Bot started');
        refreshAccounts();
    }

    async function stopBot(id) {
        await apiPost(`/api/accounts/${id}/stop`);
        showToast('Bot stopped');
        refreshAccounts();
    }

    async function startAll() {
        await apiPost('/api/start-all');
        showToast('All bots starting');
        refreshAccounts();
    }

    async function stopAll() {
        await apiPost('/api/stop-all');
        showToast('All bots stopped');
        refreshAccounts();
    }

    // ─── Authorization ───────────────────────────────────────────
    function authorize(id) {
        window.open(`/auth/${id}`, '_blank');
    }

    // ─── Render ──────────────────────────────────────────────────
    function renderAccounts(accounts) {
        const container = document.getElementById('accounts-container');

        if (!accounts.length) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">🎧</div>
                    <p>No accounts yet — add one above to get started</p>
                </div>`;
            return;
        }

        container.innerHTML = accounts.map(acc => {
            const badgeClass = `badge-${acc.status}`;
            const progress = acc.playlists.length
                ? Math.round(((acc.status === 'done' ? acc.playlists.length : acc.current_index) / acc.playlists.length) * 100)
                : 0;
            const progressText = acc.playlists.length
                ? `${acc.status === 'done' ? acc.playlists.length : acc.current_index}/${acc.playlists.length}`
                : '0/0';

            const playlistsHtml = acc.playlists.length
                ? acc.playlists.map((pl, i) => {
                    const isActive = i === acc.current_index && (acc.status === 'playing' || acc.status === 'starting');
                    const plId = pl.split(':').pop();
                    return `<div class="playlist-item ${isActive ? 'active' : ''}">
                        <span class="playlist-index">${i + 1}.</span>
                        <span class="playlist-uri">${plId}</span>
                        <button class="btn-icon" onclick="removePlaylist('${acc.id}', ${i})" title="Remove">✕</button>
                    </div>`;
                }).join('')
                : '<p class="log-empty">No playlists added</p>';

            const logsHtml = acc.log.length
                ? acc.log.map(l => `<div class="log-entry"><span class="log-time">${l.time}</span>${l.msg}</div>`).join('')
                : '<p class="log-empty">No activity yet</p>';

            const isRunning = acc.running || acc.status === 'playing' || acc.status === 'starting';
            const authDot = acc.authorized ? 'ok' : 'no';
            const authLabel = acc.authorized ? 'Authorized' : 'Not authorized';

            return `
            <div class="account-card">
                <div class="card-header">
                    <div class="card-header-left">
                        <span class="account-name">${acc.name}</span>
                        <span class="badge ${badgeClass}">${acc.status}</span>
                        <span class="auth-status"><span class="auth-dot ${authDot}"></span>${authLabel}</span>
                    </div>
                    <div class="card-header-right">
                        <button class="btn btn-outline btn-small" onclick="authorize('${acc.id}')">
                            ${acc.authorized ? '🔄 Re-Auth' : '🔑 Authorize'}
                        </button>
                        ${isRunning
                            ? `<button class="btn btn-danger btn-small" onclick="stopBot('${acc.id}')">■ Stop</button>`
                            : `<button class="btn btn-primary btn-small" onclick="startBot('${acc.id}')">▶ Start</button>`
                        }
                        <button class="btn-icon" onclick="deleteAccount('${acc.id}', '${acc.name}')" title="Delete">🗑</button>
                    </div>
                </div>
                <div class="card-body">
                    <div class="progress-section">
                        <div class="progress-label">
                            <span>Progress</span>
                            <span>${progressText} playlists</span>
                        </div>
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" style="width: ${progress}%"></div>
                        </div>
                    </div>
                    <div class="playlist-section">
                        <h3>Playlists</h3>
                        <div class="playlist-list">${playlistsHtml}</div>
                        <div class="add-playlist-row">
                            <input type="text" id="pl-input-${acc.id}" placeholder="spotify:playlist:ID or URL"
                                   onkeydown="if(event.key==='Enter')addPlaylist('${acc.id}')">
                            <button class="btn btn-outline btn-small" onclick="addPlaylist('${acc.id}')">+ Add</button>
                        </div>
                    </div>
                    <div class="log-section">
                        <h3>Activity Log</h3>
                        <div class="log-list">${logsHtml}</div>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    // ─── Polling ─────────────────────────────────────────────────
    async function refreshAccounts() {
        // Skip refresh if user is typing in any input to avoid losing focus/content
        if (document.activeElement && document.activeElement.tagName === 'INPUT') {
            return;
        }
        try {
            const accounts = await apiGet('/api/accounts');
            renderAccounts(accounts);
        } catch (e) {
            console.error('Poll error:', e);
        }
    }

    // Init
    refreshAccounts();
    pollInterval = setInterval(refreshAccounts, 5000);
</script>
</body>
</html>
