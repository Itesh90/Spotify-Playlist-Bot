# ─── Spotify Playlist Bot — Docker Compose Orchestration ─────────────────────
# The orchestrator (backend) runs always. Worker containers are spawned
# dynamically per-account via the Docker SDK inside app.py.
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── Worker Image (build-only, not started) ───────────────────────────────────
  # This service exists solely so `docker compose build` produces the
  # spb_worker:latest image that the backend spawns dynamically per account.
  # It is never run as a long-lived container — profiles: ["build-only"]
  # prevents `docker compose up` from starting it.
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    image: spb_worker:latest
    profiles: ["build-only"]

  # ── Orchestrator: Flask Backend ──────────────────────────────────────────────
  backend:
    build:
      context: .                         # Root context so app.py is included
      dockerfile: backend/Dockerfile
    container_name: spb_orchestrator
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - BASE_URL=${BASE_URL:-https://literate-yodel-x554qrxgj5qvfvvj6-3000.app.github.dev}
      - FRONTEND_URL=${FRONTEND_URL:-https://literate-yodel-x554qrxgj5qvfvvj6-3000.app.github.dev}
      - WORKER_IMAGE=spb_worker:latest        # image used to spawn worker containers
      - DATA_DIR=/app/data
      - HOST_STORAGE_PATH=/app/storage/accounts
    volumes:
      - ./storage/accounts:/app/storage/accounts  # Per-account session data + live.jpeg
      - ./data:/app/data                          # Account JSON files
      - /var/run/docker.sock:/var/run/docker.sock  # Docker-in-Docker (spawn workers)
    mem_limit: 512m                                # 4GB VPS — backend gets 512m
    networks:
      - spb_net

  # ── Frontend: Next.js Dashboard ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: spb_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Do NOT set NEXT_PUBLIC_API_URL here — it gets baked into the JS bundle at build time.
      # For Codespaces: auto-detected at runtime via window.location.hostname
      # For Oracle/Production: set via build arg (see below) or frontend/.env.local
      - NODE_ENV=production
    depends_on:
      - backend
    mem_limit: 512m                                # 4GB VPS — frontend gets 512m
    networks:
      - spb_net

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  spb_net:
    driver: bridge
    name: spb_net

# ─── Volumes ──────────────────────────────────────────────────────────────────
# Worker containers mount named volumes below for per-account storage.
# These are created automatically — no manual 'docker volume create' needed.
volumes:
  spb_storage:
